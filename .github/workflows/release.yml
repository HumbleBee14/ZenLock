name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type (overrides commit-message detection)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    # Skip auto-runs on version-bump commits to prevent infinite loops.
    # For manual runs (workflow_dispatch), restrict to repo owner only.
    if: |
      (github.event_name == 'push' && !contains(github.event.head_commit.message, 'chore: bump version')) ||
      (github.event_name == 'workflow_dispatch' && github.actor == 'HumbleBee14')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use a PAT (not GITHUB_TOKEN) so the workflow can push the
          # version-bump commit and tag through branch protection.
          # The PAT belongs to an admin who is in the ruleset bypass list.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # Version bump logic:
      # 1. Reads current versionCode and versionName from app/build.gradle.kts
      # 2. Inspects the merge commit message that triggered this workflow
      # 3. Decides the semver bump based on conventional-commit prefix:
      #      feat: .............  minor (1.8.3 -> 1.9.0)
      #      fix: / chore: / docs: / refactor: / test: / perf: ...  patch (1.8.3 -> 1.8.4)
      #      BREAKING CHANGE in body (or "BREAKING" prefix) ........ major (1.8.3 -> 2.0.0)
      # 4. versionCode ALWAYS increments by 1, regardless of bump type (Play Store requires monotonic increase)
      # 5. Writes the new values back into app/build.gradle.kts via sed
      - name: Bump version
        id: bump
        # Pass untrusted values (commit message, workflow inputs) via env vars
        # instead of `${{ }}` substitution so bash doesn't try to execute
        # anything that looks like a shell command inside them.
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          MANUAL_BUMP_INPUT: ${{ github.event.inputs.bump_type }}
        run: |
          set -e
          GRADLE_FILE="app/build.gradle.kts"
          CURRENT_CODE=$(grep -E "^\s*versionCode\s*=" "$GRADLE_FILE" | grep -oE "[0-9]+")
          CURRENT_NAME=$(grep -E "^\s*versionName\s*=" "$GRADLE_FILE" | grep -oE '"[^"]+"' | tr -d '"')

          echo "Current: code=$CURRENT_CODE name=$CURRENT_NAME"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_NAME"

          MANUAL_BUMP="$MANUAL_BUMP_INPUT"
          # Use only the first line (subject) of the commit message for type detection
          MSG=$(printf '%s' "$COMMIT_MSG" | head -n 1)

          if [ "$MANUAL_BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMP_TYPE="major (manual)"
          elif [ "$MANUAL_BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMP_TYPE="minor (manual)"
          elif [ "$MANUAL_BUMP" = "patch" ]; then
            PATCH=$((PATCH + 1))
            BUMP_TYPE="patch (manual)"
          elif echo "$MSG" | grep -qE "^(BREAKING|.*BREAKING CHANGE)"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMP_TYPE="major"
          elif echo "$MSG" | grep -qE "^feat(\(.+\))?:"; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMP_TYPE="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP_TYPE="patch"
          fi

          NEW_NAME="$MAJOR.$MINOR.$PATCH"
          NEW_CODE=$((CURRENT_CODE + 1))

          echo "New: code=$NEW_CODE name=$NEW_NAME ($BUMP_TYPE)"

          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" "$GRADLE_FILE"
          sed -i "s/versionName = \"$CURRENT_NAME\"/versionName = \"$NEW_NAME\"/" "$GRADLE_FILE"

          echo "new_version=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "new_code=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Build both flavor variants as debug APKs (auto-signed with Android's
      # debug keystore so they install via sideload):
      #   - playstore flavor: no SMS permission (matches Play Store build)
      #   - sms flavor: SEND_SMS permission included (optional variant)
      - name: Build debug APKs (playstore + sms flavors)
        run: ./gradlew assemblePlaystoreDebug assembleSmsDebug -x lint

      - name: Rename APKs
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/playstore/debug/app-playstore-debug.apk \
             "release-artifacts/zenlock-v${{ steps.bump.outputs.new_version }}-debug.apk"
          cp app/build/outputs/apk/sms/debug/app-sms-debug.apk \
             "release-artifacts/zenlock-v${{ steps.bump.outputs.new_version }}-sms-debug.apk"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin main --follow-tags

      # Changelog generation:
      # - Finds the previous version tag so we only include commits shipped in THIS release.
      # - Groups commits by Conventional Commit type into user-friendly sections.
      # - Strips the "type:" prefix from each line so the final output reads like a product changelog.
      # - Skips noise: "chore: bump version" commits, and "chore:" commits in general (internal tooling
      #   doesn't belong in user-facing release notes).
      # - Any commit not matching a recognized prefix is put under "Other changes".
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "v${{ steps.bump.outputs.new_version }}" | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            RAW=$(git log --pretty=format:"%s" -n 50)
          else
            RAW=$(git log "$PREV_TAG"..HEAD --pretty=format:"%s" --invert-grep --grep="chore: bump version")
          fi

          FEATURES=""
          FIXES=""
          PERF=""
          DOCS=""
          REFACTOR=""
          OTHER=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # Strip merge-commit wrapper like "Merge pull request #13 from ..." — keep PR references useful
            if echo "$line" | grep -qE "^Merge pull request"; then
              OTHER="${OTHER}- ${line}"$'\n'
              continue
            fi
            case "$line" in
              feat:*|feat\(*\):*)
                CLEAN=$(echo "$line" | sed -E 's/^feat(\([^)]+\))?:\s*//')
                FEATURES="${FEATURES}- ${CLEAN}"$'\n'
                ;;
              fix:*|fix\(*\):*)
                CLEAN=$(echo "$line" | sed -E 's/^fix(\([^)]+\))?:\s*//')
                FIXES="${FIXES}- ${CLEAN}"$'\n'
                ;;
              perf:*|perf\(*\):*)
                CLEAN=$(echo "$line" | sed -E 's/^perf(\([^)]+\))?:\s*//')
                PERF="${PERF}- ${CLEAN}"$'\n'
                ;;
              docs:*|docs\(*\):*)
                CLEAN=$(echo "$line" | sed -E 's/^docs(\([^)]+\))?:\s*//')
                DOCS="${DOCS}- ${CLEAN}"$'\n'
                ;;
              refactor:*|refactor\(*\):*)
                CLEAN=$(echo "$line" | sed -E 's/^refactor(\([^)]+\))?:\s*//')
                REFACTOR="${REFACTOR}- ${CLEAN}"$'\n'
                ;;
              chore:*|chore\(*\):*|test:*|test\(*\):*|style:*|ci:*|build:*)
                # Intentionally skipped from user-facing changelog
                ;;
              *)
                OTHER="${OTHER}- ${line}"$'\n'
                ;;
            esac
          done <<< "$RAW"

          CHANGELOG=""
          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}### New Features"$'\n'"${FEATURES}"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### Bug Fixes"$'\n'"${FIXES}"$'\n'
          fi
          if [ -n "$PERF" ]; then
            CHANGELOG="${CHANGELOG}### Performance"$'\n'"${PERF}"$'\n'
          fi
          if [ -n "$REFACTOR" ]; then
            CHANGELOG="${CHANGELOG}### Refactors"$'\n'"${REFACTOR}"$'\n'
          fi
          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}### Documentation"$'\n'"${DOCS}"$'\n'
          fi
          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}### Other Changes"$'\n'"${OTHER}"$'\n'
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No user-facing changes in this release."$'\n'
          fi

          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: ZenLock v${{ steps.bump.outputs.new_version }}
          body: |
            ## What's new in v${{ steps.bump.outputs.new_version }}

            ${{ steps.changelog.outputs.changelog }}

            ---
            ### Downloads

            Two debug APKs are attached below (both auto-signed with Android's debug keystore so they install via sideload):

            - **`zenlock-vX.Y.Z-debug.apk`** — default build, matches the Play Store version (no SMS permission).
            - **`zenlock-vX.Y.Z-sms-debug.apk`** — same app with SMS accountability-partner support enabled.

            You may need to uninstall the Play Store version first (different signature).
            For the official release, install from [Google Play](https://play.google.com/store/apps/details?id=com.grepguru.zenlock).
          files: release-artifacts/*.apk
          draft: false
          prerelease: false
