name: Android Build

# Compiles a debug APK to catch build breaks before merge. Split out of
# pr-validation.yml and scoped to ZenLock-Android/** so it no longer runs on
# iOS-only (or docs-only) PRs. The iOS app has its own ios-build.yml, scoped to
# ZenLock-Android's counterpart.

on:
  pull_request:
    paths:
      - "ZenLock-Android/**"
      - ".github/workflows/android-build.yml"

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: ZenLock-Android

      - name: Build both flavors (playstore + sms)
        run: ./gradlew assemblePlaystoreDebug assembleSmsDebug -x lint
        working-directory: ZenLock-Android
