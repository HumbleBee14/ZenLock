name: ZenLock
options:
  bundleIdPrefix: com.grepguru
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: false

targets:
  ZenLock:
    type: application
    platform: iOS
    sources:
      - path: ZenLock
      - path: Shared
    entitlements:
      path: ZenLock/ZenLock.entitlements
    settings:
      base:
        INFOPLIST_FILE: ZenLock/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.grepguru.zenlock
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
    dependencies:
      - target: DeviceActivityMonitorExtension
      - target: ShieldConfigurationExtension
      - target: ShieldActionExtension

  DeviceActivityMonitorExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: DeviceActivityMonitorExtension
      - path: Shared
    entitlements:
      path: DeviceActivityMonitorExtension/DeviceActivityMonitorExtension.entitlements
    settings:
      base:
        INFOPLIST_FILE: DeviceActivityMonitorExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.grepguru.zenlock.DeviceActivityMonitor
        TARGETED_DEVICE_FAMILY: "1"

  ShieldConfigurationExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldConfigurationExtension
      - path: Shared
    entitlements:
      path: ShieldConfigurationExtension/ShieldConfigurationExtension.entitlements
    settings:
      base:
        INFOPLIST_FILE: ShieldConfigurationExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.grepguru.zenlock.ShieldConfiguration
        TARGETED_DEVICE_FAMILY: "1"

  ShieldActionExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShieldActionExtension
      - path: Shared
    entitlements:
      path: ShieldActionExtension/ShieldActionExtension.entitlements
    settings:
      base:
        INFOPLIST_FILE: ShieldActionExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.grepguru.zenlock.ShieldAction
        TARGETED_DEVICE_FAMILY: "1"
